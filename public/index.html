<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Re-Entry</title>
<meta name="description" content="A quiet space for coming back. For when you've been away from something and returning feels harder than it should.">
<meta property="og:title" content="Re-Entry">
<meta property="og:description" content="A quiet space for coming back. For when you've been away from something and returning feels harder than it should.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #EEE9F5;
    --bg2: #E4DDF0;
    --border: #D4CCE0;
    --accent: #9B8AAB;
    --accent2: #7B6A9B;
    --text: #2A2230;
    --muted: #6B5F7A;
    --faint: #9B8AAB;
    --user-bg: #2A2230;
    --user-text: #EEE9F5;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
  }

  /* ── OPENING SCREEN ── */
  #opening {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    padding: 2rem;
  }

  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.4;
    pointer-events: none;
  }

  .orb1 {
    width: 340px; height: 340px;
    background: #C5B8D8;
    top: -80px; left: -60px;
    animation: drift1 22s ease-in-out infinite;
  }

  .orb2 {
    width: 260px; height: 260px;
    background: #B8C8D8;
    bottom: -60px; right: -40px;
    animation: drift2 28s ease-in-out infinite;
  }

  .orb3 {
    width: 180px; height: 180px;
    background: #D8B8C8;
    top: 45%; left: 58%;
    animation: drift3 34s ease-in-out infinite;
  }

  @keyframes drift1 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(20px, -15px) scale(1.05); }
    66% { transform: translate(-10px, 20px) scale(0.96); }
  }

  @keyframes drift2 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    40% { transform: translate(-18px, 12px) scale(1.04); }
    75% { transform: translate(14px, -20px) scale(0.97); }
  }

  @keyframes drift3 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    30% { transform: translate(14px, -10px) scale(1.06); }
    65% { transform: translate(-12px, 16px) scale(0.95); }
  }

  .opening-content {
    position: relative;
    z-index: 2;
    text-align: center;
    max-width: 420px;
    width: 100%;
    animation: fadeUp 1s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .eyebrow {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--faint);
    margin-bottom: 24px;
    font-weight: 400;
    animation: fadeUp 1s ease 0.1s both;
  }

  .opening-title {
    font-family: 'Lora', serif;
    font-size: clamp(3.5rem, 12vw, 5.5rem);
    font-weight: 400;
    color: var(--text);
    line-height: 1.05;
    margin-bottom: 20px;
    animation: fadeUp 1s ease 0.2s both;
  }

  .opening-title em {
    font-style: italic;
    color: var(--accent2);
  }

  .divider {
    width: 32px;
    height: 1px;
    background: var(--border);
    margin: 0 auto 20px;
    animation: fadeUp 1s ease 0.25s both;
  }

  .opening-sub {
    font-size: 14px;
    line-height: 1.7;
    color: var(--muted);
    margin-bottom: 36px;
    font-weight: 300;
    animation: fadeUp 1s ease 0.3s both;
  }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--text);
    color: var(--bg);
    border: none;
    padding: 12px 28px;
    border-radius: 100px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.25s ease;
    margin-bottom: 14px;
    animation: fadeUp 1s ease 0.4s both;
  }

  .cta-btn:hover {
    background: var(--accent2);
    transform: translateY(-2px);
  }

  .opening-note {
    font-size: 11px;
    color: var(--faint);
    animation: fadeUp 1s ease 0.5s both;
  }

  /* ── CHAT SCREEN ── */
  #chat {
    display: none;
    flex-direction: column;
    height: 100vh;
    background: var(--bg);
    position: relative;
    overflow: hidden;
    animation: fadeIn 0.5s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* chat orbs */
  .chat-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(70px);
    opacity: 0.25;
    pointer-events: none;
    z-index: 0;
  }

  .chat-orb1 {
    width: 300px; height: 300px;
    background: #C5B8D8;
    top: -80px; left: -80px;
    animation: drift1 24s ease-in-out infinite;
  }

  .chat-orb2 {
    width: 240px; height: 240px;
    background: #B8C8D8;
    bottom: 60px; right: -60px;
    animation: drift2 30s ease-in-out infinite;
  }

  .chat-orb3 {
    width: 160px; height: 160px;
    background: #D8B8C8;
    top: 40%; left: -40px;
    animation: drift3 36s ease-in-out infinite;
  }

  .chat-orb4 {
    width: 200px; height: 200px;
    background: #C8B8D8;
    top: 20%; right: -50px;
    animation: drift1 20s ease-in-out infinite reverse;
  }

  /* header */
  .chat-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(238, 233, 245, 0.85);
    backdrop-filter: blur(8px);
    position: relative;
    z-index: 10;
    flex-shrink: 0;
  }

  .header-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.7;
  }

  .header-name {
    font-family: 'Lora', serif;
    font-size: 15px;
    color: var(--text);
    font-weight: 400;
  }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .header-status {
    font-size: 11px;
    color: var(--faint);
  }

  .start-over {
    font-size: 11px;
    color: var(--faint);
    background: none;
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 100px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s ease;
  }

  .start-over:hover {
    border-color: var(--accent);
    color: var(--accent2);
  }

  /* messages */
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 28px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    position: relative;
    z-index: 1;
    max-width: 700px;
    width: 100%;
    margin: 0 auto;
    align-self: center;
  }

  .chat-messages::-webkit-scrollbar { width: 3px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .msg {
    display: flex;
    flex-direction: column;
    max-width: 82%;
    animation: msgIn 0.35s ease both;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.agent { align-self: flex-start; }
  .msg.user { align-self: flex-end; }

  .bubble {
    padding: 11px 15px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.65;
    font-weight: 300;
  }

  .msg.agent .bubble {
    background: var(--bg2);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }

  .msg.user .bubble {
    background: var(--user-bg);
    color: var(--user-text);
    border-bottom-right-radius: 4px;
  }

  /* typing dots */
  .typing {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 13px 15px;
    background: var(--bg2);
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    width: fit-content;
    align-self: flex-start;
    animation: msgIn 0.35s ease both;
  }

  .typing span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: typingBounce 1.2s ease infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* input */
  .chat-input-wrap {
    padding: 12px 20px 20px;
    border-top: 1px solid var(--border);
    background: rgba(238, 233, 245, 0.85);
    backdrop-filter: blur(8px);
    position: relative;
    z-index: 10;
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    max-width: 700px;
    margin: 0 auto;
  }

  textarea {
    flex: 1;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 300;
    color: var(--text);
    resize: none;
    outline: none;
    min-height: 44px;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.2s ease;
  }

  textarea::placeholder { color: var(--faint); }
  textarea:focus { border-color: var(--accent); }

  .send-btn {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--text);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    flex-shrink: 0;
    margin-bottom: 1px;
  }

  .send-btn:hover { background: var(--accent2); transform: scale(1.05); }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  .send-btn svg { width: 16px; height: 16px; fill: var(--bg); }

  /* responsive */
  @media (max-width: 600px) {
    .chat-messages { padding: 20px 14px; }
    .chat-input-wrap { padding: 10px 14px 16px; }
    .msg { max-width: 88%; }
  }
</style>
</head>
<body>

<!-- OPENING SCREEN -->
<div id="opening">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="opening-content">
    <p class="eyebrow">a quiet space for coming back</p>
    <h1 class="opening-title">Re-<em>Entry</em></h1>
    <div class="divider"></div>
    <p class="opening-sub">For when you've been away from something<br>and coming back feels harder than it should.<br><br>No plans, no pressure — just a conversation<br>to help you find the smallest way back in.</p>
    <button class="cta-btn" onclick="startChat()">I'm ready →</button>
    <p class="opening-note">No account needed. No judgment either.</p>
  </div>
</div>

<!-- CHAT SCREEN -->
<div id="chat">
  <div class="chat-orb chat-orb1"></div>
  <div class="chat-orb chat-orb2"></div>
  <div class="chat-orb chat-orb3"></div>
  <div class="chat-orb chat-orb4"></div>

  <div class="chat-header">
    <div class="header-dot"></div>
    <span class="header-name">Re-Entry</span>
    <div class="header-right">
      <span class="header-status">here with you</span>
      <button class="start-over" onclick="resetChat()">start over</button>
    </div>
  </div>

  <div class="chat-messages" id="messages"></div>

  <div class="chat-input-wrap">
    <div class="input-row">
      <textarea
        id="input"
        placeholder="whatever's on your mind..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
  const OPENING = "Coming back after a break can feel heavier than people expect. You're here. That already took something. What feels easiest to start with?";
  let messages = [];
  let isLoading = false;

  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const messagesEl = document.getElementById('messages');

  inputEl.addEventListener('input', () => {
    sendBtn.disabled = !inputEl.value.trim() || isLoading;
  });

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function scrollToBottom() {
    setTimeout(() => {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }, 50);
  }

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    div.appendChild(bubble);
    messagesEl.appendChild(div);
    scrollToBottom();
    return bubble;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typing';
    div.innerHTML = '<span></span><span></span><span></span>';
    messagesEl.appendChild(div);
    scrollToBottom();
  }

  function hideTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function startChat() {
    document.getElementById('opening').style.display = 'none';
    document.getElementById('chat').style.display = 'flex';

    // Show opening message immediately
    addMessage('agent', OPENING);
    messages.push({ role: 'assistant', content: OPENING });
    inputEl.focus();
  }

  function resetChat() {
    messages = [];
    messagesEl.innerHTML = '';
    isLoading = false;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    addMessage('agent', OPENING);
    messages.push({ role: 'assistant', content: OPENING });
    inputEl.focus();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;
    isLoading = true;

    addMessage('user', text);
    messages.push({ role: 'user', content: text });

    showTyping();

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages })
      });

      hideTyping();

      if (!response.ok) throw new Error('API error');

      // Create agent bubble for streaming
      const div = document.createElement('div');
      div.className = 'msg agent';
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      div.appendChild(bubble);
      messagesEl.appendChild(div);

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let fullText = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value);
        const lines = chunk.split('\n');

        for (const line of lines) {
          if (line.startsWith('data: ')) {
            const data = line.slice(6);
            if (data === '[DONE]') break;
            try {
              const parsed = JSON.parse(data);
              if (parsed.text) {
                fullText += parsed.text;
                bubble.textContent = fullText;
                scrollToBottom();
              }
            } catch {}
          }
        }
      }

      messages.push({ role: 'assistant', content: fullText });

    } catch (err) {
      hideTyping();
      addMessage('agent', "Something went quiet on my end. Still here though — what were you saying?");
    }

    isLoading = false;
    sendBtn.disabled = !inputEl.value.trim();
    inputEl.focus();
  }
</script>
</body>
</html>
